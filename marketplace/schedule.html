<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule | Student Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="hidden md:flex flex-col w-64 bg-white border-r p-6 sticky top-0 h-screen">
            <h1 class="font-bold text-2xl text-blue-600 mb-10">StudentHub</h1>
            <nav class="space-y-2">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-xl transition-all">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </a>
                <a href="mess.html" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-xl transition-all">
                    <i data-lucide="utensils" class="w-5 h-5"></i> Mess Portal
                </a>
                <a href="schedule.html" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-xl font-bold">
                    <i data-lucide="calendar" class="w-5 h-5"></i> Schedule
                </a>
                <a href="profile.html" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-xl transition-all">
                    <i data-lucide="user" class="w-5 h-5"></i> Profile
                </a>
            </nav>
        </aside>

        <main class="flex-1 p-6 md:p-10 pb-24">
            <h2 class="text-3xl font-bold mb-8">Academic Schedule</h2>
            
            <div class="bg-white rounded-3xl border shadow-sm overflow-hidden">
                <div class="p-6 border-b flex justify-between items-center bg-slate-50/50">
                    <h3 class="font-bold">Today, Oct 24</h3>
                    <div class="flex gap-2">
                        <button class="p-2 hover:bg-white rounded-lg text-slate-400"><i data-lucide="chevron-left"></i></button>
                        <button class="p-2 hover:bg-white rounded-lg text-slate-400"><i data-lucide="chevron-right"></i></button>
                    </div>
                </div>
                <div class="divide-y">
                    <div class="p-8 flex gap-8 items-start hover:bg-slate-50 transition-all">
                        <div class="w-24 shrink-0 text-sm font-bold text-blue-600 pt-1">09:00 AM</div>
                        <div class="flex-1">
                            <h4 class="font-bold text-lg">Computer Networks</h4>
                            <p class="text-slate-500 text-sm">Main Lecture Hall • Dr. Sarah Williams</p>
                        </div>
                        <div class="hidden sm:block"><span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-[10px] font-bold">FINISHED</span></div>
                    </div>
                    <div class="p-8 flex gap-8 items-start bg-blue-50/30">
                        <div class="w-24 shrink-0 text-sm font-bold text-blue-600 pt-1">11:30 AM</div>
                        <div class="flex-1">
                            <h4 class="font-bold text-lg">Software Engineering</h4>
                            <p class="text-slate-500 text-sm">Lab 4 • Prof. Gupta</p>
                            <span class="inline-flex items-center gap-1 mt-3 px-2 py-1 bg-blue-100 text-blue-700 text-[10px] font-bold rounded uppercase animate-pulse">
                                <i data-lucide="radio" class="w-3 h-3"></i> Ongoing
                            </span>
                        </div>
                    </div>
                    <div class="p-8 flex gap-8 items-start hover:bg-slate-50 transition-all">
                        <div class="w-24 shrink-0 text-sm font-bold text-slate-400 pt-1">02:00 PM</div>
                        <div class="flex-1">
                            <h4 class="font-bold text-lg">Ethics in Computing</h4>
                            <p class="text-slate-500 text-sm">Seminar Room B • TBD</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Navigation -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-50">
        <a href="index.html" class="text-slate-400 flex flex-col items-center"><i data-lucide="layout-dashboard"></i><span class="text-[10px] font-bold mt-1">HOME</span></a>
        <a href="mess.html" class="text-slate-400 flex flex-col items-center"><i data-lucide="utensils"></i><span class="text-[10px] font-bold mt-1">MESS</span></a>
        <a href="schedule.html" class="text-blue-600 flex flex-col items-center"><i data-lucide="calendar"></i><span class="text-[10px] font-bold mt-1">CLASS</span></a>
        <a href="profile.html" class="text-slate-400 flex flex-col items-center"><i data-lucide="user"></i><span class="text-[10px] font-bold mt-1">ME</span></a>
    </nav>

    <script>lucide.createIcons();</script>
</body>
</html>
