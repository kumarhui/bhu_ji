<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Student Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="hidden md:flex flex-col w-64 bg-white border-r p-6 sticky top-0 h-screen">
            <h1 class="font-bold text-2xl text-blue-600 mb-10">StudentHub</h1>
            <nav class="space-y-2">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-xl transition-all">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </a>
                <a href="mess.html" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-xl transition-all">
                    <i data-lucide="utensils" class="w-5 h-5"></i> Mess Portal
                </a>
                <a href="schedule.html" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-xl transition-all">
                    <i data-lucide="calendar" class="w-5 h-5"></i> Schedule
                </a>
                <a href="profile.html" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-xl font-bold">
                    <i data-lucide="user" class="w-5 h-5"></i> Profile
                </a>
            </nav>
        </aside>

        <main class="flex-1 p-6 md:p-10 pb-24">
            <div class="max-w-2xl mx-auto">
                <div class="bg-white rounded-3xl border shadow-sm p-8 text-center relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-32 bg-blue-600"></div>
                    
                    <div class="relative z-10">
                        <div class="w-32 h-32 bg-white rounded-full mx-auto mb-6 p-1 border-4 border-white shadow-lg overflow-hidden">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Profile" class="w-full h-full rounded-full">
                        </div>
                        <h2 class="text-2xl font-bold">Felix Student</h2>
                        <p class="text-slate-500 mb-8">Bachelor of Technology • CS</p>
                        
                        <div class="grid grid-cols-2 gap-4 text-left mb-10">
                            <div class="p-4 bg-slate-50 rounded-2xl border">
                                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Student ID</p>
                                <p class="font-semibold">CSU-2023-8901</p>
                            </div>
                            <div class="p-4 bg-slate-50 rounded-2xl border">
                                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Email</p>
                                <p class="font-semibold">felix@college.edu</p>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <button class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all">Update Information</button>
                            <button class="w-full text-red-500 font-bold py-2 hover:underline">Log Out</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Navigation -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-50">
        <a href="index.html" class="text-slate-400 flex flex-col items-center"><i data-lucide="layout-dashboard"></i><span class="text-[10px] font-bold mt-1">HOME</span></a>
        <a href="mess.html" class="text-slate-400 flex flex-col items-center"><i data-lucide="utensils"></i><span class="text-[10px] font-bold mt-1">MESS</span></a>
        <a href="schedule.html" class="text-slate-400 flex flex-col items-center"><i data-lucide="calendar"></i><span class="text-[10px] font-bold mt-1">CLASS</span></a>
        <a href="profile.html" class="text-blue-600 flex flex-col items-center"><i data-lucide="user"></i><span class="text-[10px] font-bold mt-1">ME</span></a>
    </nav>

    <script>lucide.createIcons();</script>
</body>
</html>
